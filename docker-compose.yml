version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: mfra-postgres
    environment:
      POSTGRES_DB: mfra
      POSTGRES_USER: mfra
      POSTGRES_PASSWORD: mfra
    ports:
      - "5460:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mfra"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: mfra-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: mfra-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
