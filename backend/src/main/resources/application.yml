server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: mfra-website

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5460}/${DB_NAME:mfra}
    username: ${DB_USER:mfra}
    password: ${DB_PASS:mfra}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    show-sql: false
    open-in-view: false

  flyway:
    enabled: false
    locations: classpath:db/migration
    validate-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      timeout: 2000ms

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-key-that-must-be-changed-in-production-256bit}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    remember-expiration-ms: ${JWT_REMEMBER_EXPIRATION_MS:2592000000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:noreply@mfra.com}
    from-name: ${MAIL_FROM_NAME:MFRA Team}
    admin-email: ${ADMIN_EMAIL:admin@mfra.com}
    reply-to: ${MAIL_REPLY_TO:hello@mfra.com}
  admin:
    default-email: ${ADMIN_DEFAULT_EMAIL:admin@mfra.com}
    default-password: ${ADMIN_DEFAULT_PASSWORD:admin@123}
    default-name: ${ADMIN_DEFAULT_NAME:MFRA Admin}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
