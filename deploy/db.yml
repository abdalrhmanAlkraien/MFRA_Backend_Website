services:
  postgres:
    image: postgres:16
    container_name: mfra-postgres
    restart: always
    environment:
      POSTGRES_DB: mfra_test
      POSTGRES_USER: mfra
      POSTGRES_PASSWORD: mfra
    ports:
      - "5460:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - infra-network

volumes:
  postgres_data:

networks:
  infra-network:
    driver: bridge